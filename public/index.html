const uid     = () => Math.random().toString(36).slice(2,9);
const pad2    = n  => String(n).padStart(2,"0");
const fmtT    = s  => `${pad2(Math.floor(s/60))}:${pad2(s%60)}`;
const fmtDate = ts => new Date(ts).toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});
const fmtTime = ts => new Date(ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
const fmtDateShort = ts => new Date(ts).toLocaleDateString(undefined,{month:"short",day:"numeric"});

function getEmbedUrl(url) {
  if(!url) return null;
  const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if(yt) return `https://www.youtube.com/embed/${yt[1]}?rel=0&autoplay=1`;
  const vimeo = url.match(/vimeo\.com\/(\d+)/);
  if(vimeo) return `https://player.vimeo.com/video/${vimeo[1]}?autoplay=1`;
  // Google Drive: /file/d/ID/view → /file/d/ID/preview
  const gd = url.match(/drive\.google\.com\/file\/d\/([^/]+)/);
  if(gd) return `https://drive.google.com/file/d/${gd[1]}/preview`;
  return null;
}
function isDirectVideo(url) {
  if(!url) return false;
  if(url.includes('firebasestorage.googleapis.com')) return true;
  return /\.(mp4|webm|ogg|mov)(\?|$)/i.test(url);
}

function useRecords() {
  const [records, setRecords] = useState([]);
  useEffect(() => {
    const ref = db.ref('logs');
    ref.on('value', snap => {
      const val = snap.val();
      const arr = val ? Object.values(val) : [];
      arr.sort((a, b) => b.timestamp - a.timestamp);
      setRecords(arr);
    });
    return () => ref.off();
  }, []);
  const addRecord = useCallback(rec => {
    db.ref('logs').push(rec);
  }, []);
  return { records, addRecord };
}

function useIssues() {
  const [issues, setIssues] = useState(DEFAULT_ISSUES);
  const [issuesLoaded, setIssuesLoaded] = useState(false);
  const seeded = useRef(false);
  useEffect(() => {
    const ref = db.ref('issues');
    const handler = snap => {
      const val = snap.val();
      if (!val) {
        // Firebase empty — seed with defaults (only once)
        if (!seeded.current) {
          seeded.current = true;
          const seed = {};
          DEFAULT_ISSUES.forEach((iss, i) => { seed[i] = iss; });
          ref.set(seed); // triggers handler again with the seeded data
        }
      } else {
        // Normalise Firebase object → array, filtering out any nulls
        const arr = (Array.isArray(val) ? val : Object.values(val)).filter(Boolean);
        setIssues(arr);
        setIssuesLoaded(true);
      }
    };
    ref.on('value', handler);
    return () => ref.off('value', handler);
  }, []);
  const saveIssues = useCallback(list => {
    setIssues(list);
    const obj = {};
    list.forEach((iss, i) => { obj[i] = iss; });
    db.ref('issues').set(obj);
  }, []);
  return { issues, saveIssues, issuesLoaded };
}

function useGuides() {
  const [guides, setGuides] = useState({});
  useEffect(() => {
    const ref = db.ref('guides');
    ref.on('value', snap => {
      setGuides(snap.val() || {});
    });
    return () => ref.off();
  }, []);
  const saveGuide = useCallback((id, url) => {
    db.ref('guides').child(id).set(url);
  }, []);
  const removeGuide = useCallback(id => {
    db.ref('guides').child(id).remove();
  }, []);
  return { guides, saveGuide, removeGuide };
}

function useTimer(active) {
  const [elapsed, setElapsed] = useState(0);
  const origin = useRef(null); const tick = useRef(null);
  useEffect(() => {
    if(active){ origin.current=Date.now(); setElapsed(0); tick.current=setInterval(()=>setElapsed(Math.floor((Date.now()-origin.current)/1000)),500); }
    else clearInterval(tick.current);
    return () => clearInterval(tick.current);
  },[active]);
  return elapsed;
}

function useEscClose(handler, enabled=true) {
  useEffect(() => {
    if(!enabled) return;
    const fn = e => { if(e.key==="Escape") handler(); };
    window.addEventListener("keydown",fn); return () => window.removeEventListener("keydown",fn);
  },[handler,enabled]);
}

// Determine how to play a URL
function classifyUrl(url) {
  if(!url) return "none";
  if(isDirectVideo(url)) return "video";
  const yt=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if(yt) return "embed";
  if(url.match(/vimeo\.com\/(\d+)/)) return "embed";
  if(url.match(/drive\.google\.com\/file\/d\//)) return "embed"; // Google Drive /preview
  return "external"; // SharePoint, OneDrive, other — blocked by X-Frame-Options
}

                <span style={{marginLeft:"auto",background:"var(--bg-deep)",border:"1px solid var(--border-mid)",borderRadius:6,padding:"3px 9px",fontSize:12,color:"var(--t2)",fontVariantNumeric:"tabular-nums"}}>⏱ {fmtT(elapsed)}</span>
              </div>
              <h2 style={{fontSize:15,fontWeight:800,color:"var(--t1)",lineHeight:1.4}}>{issue.symptom}</h2>
              <div style={{fontSize:11,color:"var(--t3)",marginTop:4,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <div style={{display:"flex",gap:4,alignItems:"center"}}>
                  {[...Array(totalSteps)].map((_,i)=>(
                    <div key={i} style={{width:18,height:4,borderRadius:2,background:steps.has(i)?"#22c55e":"var(--border-mid)",transition:"background 200ms ease"}}/>
                  ))}
                </div>
                <span>{doneCount}/{totalSteps} steps</span>
                {allDone&&!isClosed&&<span style={{color:"var(--grn)",fontWeight:700}}>✓ Ready to sign off</span>}
              </div>
            </div>
            {/* Close button — always visible on mobile */}
            <button onClick={onClose} style={{flexShrink:0,width:34,height:34,borderRadius:8,border:"1px solid var(--border-mid)",background:"var(--bg-deep)",color:"var(--t2)",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,lineHeight:1}}>✕</button>
          </div>
        </div>

        {/* Mobile hint */}
        {!isClosed&&<div className="panel-mobile-hint" style={{display:"none",background:"rgba(58,171,94,.08)",borderBottom:"1px solid rgba(58,171,94,.18)",padding:"8px 16px",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <span style={{fontSize:12,color:"var(--acc)",fontWeight:600}}>👇 Scroll down to sign off</span>
          <button className="btn btn--ghost" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>{document.querySelector('.panel-col-right')?.scrollIntoView({behavior:'smooth'});}}>Go to Sign-Off</button>
        </div>}

        {/* Body */}
        <div className="panel-body" style={{flex:1,overflow:"hidden",minHeight:0}}>
          {/* Left col */}
          <div className="panel-col-left">
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              {/* Root cause */}
              <div style={{background:"linear-gradient(135deg,rgba(58,171,94,.07),rgba(58,171,94,.02))",borderLeft:"3px solid var(--fgf-green)",borderRadius:8,padding:"12px 16px"}}>
                <div style={{fontSize:10,fontWeight:800,color:"var(--acc)",letterSpacing:".08em",marginBottom:6}}>🔍 ROOT CAUSE</div>
                <p style={{fontSize:13,color:"var(--t2)",lineHeight:1.7,margin:0}}>{issue.cause}</p>
              </div>
              {/* Video */}
              {(guideUrl||adminUnlocked)&&(
              <div style={{background:"var(--bg-deep)",border:"1px solid var(--border)",borderRadius:10,padding:"12px 14px"}}>
                <VideoGuideSection issueId={issue.id} guideUrl={guideUrl} onSave={onSaveGuide} onRemove={onRemoveGuide} adminUnlocked={adminUnlocked}/>
              </div>
              )}
              {/* Steps */}
              <div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                  <div style={{fontSize:10,fontWeight:800,color:"var(--t3)",letterSpacing:".08em"}}>📋 CORRECTIVE ACTIONS</div>
                  <div style={{fontSize:11,color:"var(--t4)"}}>{doneCount}/{totalSteps} done</div>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:5}}>
                  {issue.steps.map((step,i)=>{
                    const done=steps.has(i); const locked=isClosed;
                    return (
                      <div key={i} className={`step${locked?" step--locked":""}`}
                        onClick={()=>!locked&&onToggleStep(i)}
                        role={locked?"listitem":"checkbox"} aria-checked={done} tabIndex={locked?-1:0}
                        onKeyDown={e=>{if(!locked&&(e.key==="Enter"||e.key===" ")){e.preventDefault();onToggleStep(i);}}}
                        style={{display:"flex",gap:10,padding:"11px 14px",background:done?"#f0fdf4":"var(--bg-deep)",border:`1px solid ${done?"rgba(22,163,74,.22)":"var(--border)"}`,borderRadius:8,transition:"all 180ms ease"}}>
                        <div style={{width:24,height:24,borderRadius:"50%",flexShrink:0,background:done?"var(--grn)":"var(--bg-deep)",border:`2px solid ${done?"var(--grn)":"var(--border-mid)"}`,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 200ms ease",fontSize:11,fontWeight:800,color:done?"#000":"var(--t4)"}}>
                          {done?<span className="check-pop">✓</span>:i+1}
                        </div>
                        <span style={{fontSize:13,color:done?"var(--t4)":"var(--t2)",textDecoration:done?"line-through":"none",lineHeight:1.6,paddingTop:2}}>{step}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
              {issue.escalate&&issue.escalateNote&&(
                <div style={{background:"rgba(245,158,11,.07)",border:"1px solid rgba(245,158,11,.22)",borderRadius:8,padding:"11px 13px"}}>
                  <div style={{fontSize:10,fontWeight:800,color:"var(--acc)",letterSpacing:".06em",marginBottom:5}}>⚠ ESCALATION NOTE</div>
                  <p style={{fontSize:12,color:"var(--t2)",lineHeight:1.65,margin:0}}>{issue.escalateNote}</p>
                </div>
              )}
              <div style={{height:4}}/>
            </div>
          </div>

          {/* Right col — sign-off */}
          <div className="panel-col-right">
            {isClosed?(
              <div className="confirm-tile"
                style={{background:closedInfo.outcome==="resolved"?"rgba(34,197,94,.07)":"rgba(245,158,11,.08)",border:`1px solid ${closedInfo.outcome==="resolved"?"rgba(34,197,94,.28)":"rgba(245,158,11,.28)"}`,borderRadius:10,padding:16}}>
                <div style={{textAlign:"center",marginBottom:14}}>
                  <span style={{fontSize:36}}>{closedInfo.outcome==="resolved"?"✅":"🔔"}</span>
                  <div style={{fontSize:15,fontWeight:800,marginTop:6,color:closedInfo.outcome==="resolved"?"#22c55e":"#f59e0b"}}>
                    {closedInfo.outcome==="resolved"?"Issue Resolved":"Issue Escalated"}
                  </div>
                  <div style={{fontSize:11,color:"var(--t3)",marginTop:2}}>Record saved</div>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {[["👷 Operator",closedInfo.operator],["📦 SKU",closedInfo.sku],["⏱ Time",closedInfo.timeToFix],["📋 Outcome",closedInfo.outcome.toUpperCase()]].map(([l,v])=>(
                    <div key={l} style={{background:"var(--bg-deep)",borderRadius:7,padding:"9px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",border:"1px solid var(--border)"}}>
                      <span style={{fontSize:11,color:"var(--t4)"}}>{l}</span>
                      <span style={{fontSize:12,fontWeight:700,color:"var(--t1)"}}>{v}</span>
                    </div>
                  ))}
                </div>
              </div>
            ):(
              <div ref={signOffRef} style={{display:"flex",flexDirection:"column",gap:12}}>
                <div style={{fontSize:10,fontWeight:800,color:"var(--t3)",letterSpacing:".08em"}}>📋 SIGN-OFF & RECORD</div>
                <div>
                  <label style={{fontSize:11,color:"var(--t3)",display:"block",marginBottom:5,fontWeight:600}}>Operator Name <span style={{color:"var(--red)"}}>*</span></label>
                  <input key={`err-${errKey}`} ref={opRef} value={opName} onChange={e=>{setOpName(e.target.value);setOpErr(false);}}
                    placeholder="Your name" className={`input${opErr?" input--error":""}`}/>
                  {opErr&&<div style={{color:"var(--red)",fontSize:11,marginTop:4,fontWeight:600}}>⚠ Required</div>}
                </div>
                <div>
                  <label style={{fontSize:11,color:"var(--t3)",display:"block",marginBottom:5,fontWeight:600}}>SKU / Product</label>
                  <input value={sku} onChange={e=>setSku(e.target.value)} placeholder="e.g. 82" className="input"/>
                </div>
                <div>
                  <label style={{fontSize:11,color:"var(--t3)",display:"block",marginBottom:5,fontWeight:600}}>Notes <span style={{color:"var(--t4)",fontWeight:400}}>(optional)</span></label>
                  <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={3} placeholder="Observations, workarounds…" className="input" style={{resize:"vertical"}}/>
                </div>
                <div style={{background:"rgba(239,68,68,.04)",border:"1px solid rgba(239,68,68,.18)",borderRadius:8,padding:"10px 12px"}}>
                  <div style={{fontSize:11,color:"var(--red)",fontWeight:700,marginBottom:8}}>📹 Issue Video <span style={{color:"var(--t4)",fontWeight:400}}>(if escalating)</span></div>
                  <input ref={videoInputRef} type="file" accept="video/*" capture="environment"
                    style={{display:"none"}} onChange={e=>setVideoFile(e.target.files[0]||null)}/>
                  {!videoFile?(
                    <button type="button" className="btn btn--ghost btn--full"
                      style={{border:"1.5px dashed var(--border-mid)",borderRadius:8,padding:"14px",flexDirection:"column",gap:4,height:"auto"}}
                      onClick={()=>videoInputRef.current?.click()}>
                      <span style={{fontSize:22}}>🎥</span>
                      <span style={{fontSize:12,fontWeight:700,color:"var(--t2)"}}>Tap to record / choose video</span>
                      <span style={{fontSize:10,color:"var(--t4)",fontWeight:400}}>Opens camera or file picker</span>
                    </button>
                  ):(
                    <div style={{background:"var(--bg-deep)",border:"1px solid var(--border-mid)",borderRadius:8,padding:"10px 12px"}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}>
                          <span style={{fontSize:18,flexShrink:0}}>🎬</span>
                          <div style={{minWidth:0}}>
                            <div style={{fontSize:12,fontWeight:700,color:"var(--t1)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{videoFile.name}</div>
                            <div style={{fontSize:10,color:"var(--t4)"}}>{(videoFile.size/1024/1024).toFixed(1)} MB</div>
                          </div>
                        </div>
                        <button type="button" className="btn btn--ghost" style={{padding:"3px 9px",fontSize:11,flexShrink:0}}
                          onClick={()=>{setVideoFile(null);if(videoInputRef.current)videoInputRef.current.value="";}}>× Remove</button>
                      </div>
                      {uploading&&(
                        <div style={{marginTop:10}}>
                          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"var(--t3)",marginBottom:4}}>
                            <span>Uploading…</span><span>{uploadPct}%</span>
                          </div>
                          <div style={{height:6,background:"var(--border)",borderRadius:99,overflow:"hidden"}}>
                            <div style={{width:`${uploadPct}%`,height:"100%",background:"var(--red)",borderRadius:99,transition:"width 200ms ease"}}/>
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                </div>
                {escalationEmail&&escalationEmail.trim()&&(
                  <div style={{background:"rgba(58,171,94,.06)",border:"1px solid rgba(58,171,94,.2)",borderRadius:8,padding:"10px 12px"}}>
                    <div style={{fontSize:10,color:"var(--t4)",marginBottom:2}}>📧 On escalation, will notify:</div>
                    <div style={{fontSize:11,color:"var(--acc)",fontWeight:600,wordBreak:"break-all"}}>{escalationEmail}</div>
                  </div>
                )}
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  <button className="btn btn--green btn--full" style={{fontSize:13,padding:"11px"}} disabled={uploading} onClick={()=>handleSubmit("resolved")}>
                    ✅ {allDone?"Mark as Resolved":"Resolve (incomplete steps)"}
                  </button>
                  <button className="btn btn--amber btn--full" style={{fontSize:13,padding:"11px",opacity:uploading?.6:1}} disabled={uploading} onClick={()=>handleSubmit("escalated")}>
                    {uploading?`⏳ Uploading… ${uploadPct}%`:"🔔 Escalate Issue"}
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>

        {/* Footer */}
        <div style={{background:"var(--bg-deep)",borderTop:"1px solid var(--border)",padding:"10px 20px",display:"flex",gap:8,flexShrink:0}}>
          <button className="btn btn--ghost" style={{flex:1,justifyContent:"center"}} onClick={onClose}>
            ← Close <span style={{fontSize:10,color:"var(--t4)",marginLeft:"auto"}}>ESC</span>
          </button>
        </div>
      </div>
    </>
  );
}

// ─── ANALYTICS TAB ────────────────────────────────────────────────────────────
function AnalyticsTab({records, issues}) {
  const [from, setFrom] = useState("");
  const [to, setTo]     = useState("");
  const [watchUrl, setWatchUrl] = useState("");

  const filtered = useMemo(()=>{
    let r=[...records];
    if(from){ const f=new Date(from).getTime(); r=r.filter(x=>x.timestamp>=f); }
    if(to){ const t=new Date(to).getTime()+86399999; r=r.filter(x=>x.timestamp<=t); }
    return r;
  },[records,from,to]);

  const total=filtered.length;
  const res=filtered.filter(r=>r.outcome==="resolved").length;
  const esc=filtered.filter(r=>r.outcome==="escalated").length;
  const resPct=total?Math.round((res/total)*100):0;
  const today=records.filter(r=>Date.now()-r.timestamp<86400000).length;
  const week=records.filter(r=>Date.now()-r.timestamp<604800000).length;

  const tagCounts = useMemo(()=>{
    const m={}; filtered.forEach(r=>{ m[r.tag]=(m[r.tag]||0)+1; });
    return Object.entries(m).sort((a,b)=>b[1]-a[1]);
  },[filtered]);

  const issueCounts = useMemo(()=>{
    const m={}; filtered.forEach(r=>{ m[r.issueId]=(m[r.issueId]||0)+1; });
    return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,8)
      .map(([id,n])=>({issue:issues.find(i=>i.id===id)||{symptom:id,tag:"?"},count:n}));
  },[filtered,issues]);

  const lineCounts = useMemo(()=>{
    const m={}; filtered.forEach(r=>{ m[r.line||"Unknown"]=(m[r.line||"Unknown"]||0)+1; });
    return Object.entries(m).sort((a,b)=>b[1]-a[1]);
  },[filtered]);

  const recent=[...filtered].sort((a,b)=>b.timestamp-a.timestamp).slice(0,10);
  const maxTag=tagCounts[0]?.[1]||1;
  const maxIss=issueCounts[0]?.count||1;
  const maxLine=lineCounts[0]?.[1]||1;

  if(records.length===0){
    return (
      <div style={{textAlign:"center",padding:"60px 20px",color:"var(--t4)"}}>
        <div style={{fontSize:48,marginBottom:16}}>📊</div>
        <div style={{fontSize:18,fontWeight:700,color:"var(--t3)",marginBottom:8}}>No data yet</div>
        <div style={{fontSize:13}}>Resolve or escalate issues to see analytics here</div>
      </div>
    );
  }

  return (
    <div style={{padding:"16px 20px",maxWidth:960,margin:"0 auto"}}>
      {watchUrl&&<VideoSheet url={watchUrl} title="Escalation Video" onClose={()=>setWatchUrl("")}/>}
      {/* Date filter */}
      <div style={{background:"#ffffff",border:"1px solid var(--border)",borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",gap:12,alignItems:"center",flexWrap:"wrap",boxShadow:"var(--shadow-sm)"}}>
        <span style={{fontSize:12,color:"var(--t2)",fontWeight:700}}>📅 Date Range</span>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <div>
            <label style={{fontSize:10,color:"var(--t3)",display:"block",marginBottom:3,fontWeight:600}}>FROM</label>
            <input type="date" value={from} onChange={e=>setFrom(e.target.value)} className="input" style={{width:160,padding:"7px 10px",fontSize:12}}/>
          </div>
          <span style={{color:"var(--t4)",fontSize:12,paddingTop:16}}>→</span>
          <div>
            <label style={{fontSize:10,color:"var(--t3)",display:"block",marginBottom:3,fontWeight:600}}>TO</label>
            <input type="date" value={to} onChange={e=>setTo(e.target.value)} className="input" style={{width:160,padding:"7px 10px",fontSize:12}}/>
          </div>
        </div>
        {(from||to)&&<button className="btn btn--ghost" style={{fontSize:11,padding:"7px 12px",alignSelf:"flex-end"}} onClick={()=>{setFrom("");setTo("");}}>✕ Clear</button>}
        <span style={{fontSize:11,color:"var(--t3)",marginLeft:"auto",background:"var(--bg-deep)",border:"1px solid var(--border)",borderRadius:6,padding:"4px 10px",fontWeight:600}}>{total} record{total!==1?"s":""}</span>
      </div>

      {/* KPI row */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:8,marginBottom:16}}>
        {[
          {label:"Today",value:today,color:"#f59e0b",icon:"📅"},
          {label:"This Week",value:week,color:"#3b82f6",icon:"📆"},
          {label:"Total (filtered)",value:total,color:"#f1f5f9",icon:"📋"},
          {label:"Resolved",value:res,color:"#22c55e",icon:"✅"},
          {label:"Escalated",value:esc,color:"#f59e0b",icon:"🔔"},
          {label:"Resolution Rate",value:`${resPct}%`,color:"#22c55e",icon:"📈"},
        ].map(({label,value,color,icon})=>(
          <div key={label} className="kpi" style={{textAlign:"center"}}>
            <div style={{fontSize:10,color:"var(--t3)",marginBottom:3}}>{icon} {label}</div>
            <div style={{fontSize:22,fontWeight:800,color,fontVariantNumeric:"tabular-nums"}}>{value}</div>
          </div>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12,marginBottom:16}}>
        {/* Issues by tag */}
        <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:10,padding:"14px 16px"}}>
          <div style={{fontSize:11,fontWeight:800,color:"var(--t3)",letterSpacing:".07em",marginBottom:12}}>ISSUES BY TAG</div>
          {tagCounts.length===0?<div style={{fontSize:12,color:"var(--t4)"}}>No data</div>:tagCounts.map(([tag,count])=>{
            const color=TAG_COLORS[tag]||"#94a3b8";
            return (
              <div key={tag} style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{fontSize:12,color,fontWeight:700}}>{tag}</span>
                  <span style={{fontSize:12,color:"var(--t3)"}}>{count}</span>
                </div>
                <div style={{height:5,background:"var(--border)",borderRadius:99,overflow:"hidden"}}>
                  <div style={{width:`${(count/maxTag)*100}%`,height:"100%",background:color,borderRadius:99,transition:"width 600ms ease"}}/>
                </div>
              </div>
            );
          })}
        </div>

        {/* Issues by line */}
        <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:10,padding:"14px 16px"}}>
          <div style={{fontSize:11,fontWeight:800,color:"var(--t3)",letterSpacing:".07em",marginBottom:12}}>ISSUES BY LINE</div>
          {lineCounts.length===0?<div style={{fontSize:12,color:"var(--t4)"}}>No data</div>:lineCounts.map(([line,count])=>{
            const color=LINE_COLORS[line]||"#64748b";
            return (
              <div key={line} style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{fontSize:12,color,fontWeight:700}}>{line}</span>
                  <span style={{fontSize:12,color:"var(--t3)"}}>{count}</span>
                </div>
                <div style={{height:5,background:"var(--border)",borderRadius:99,overflow:"hidden"}}>
                  <div style={{width:`${(count/maxLine)*100}%`,height:"100%",background:color,borderRadius:99,transition:"width 600ms ease"}}/>
                </div>
              </div>
            );
          })}
        </div>

        {/* Outcome split */}
        <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:10,padding:"14px 16px"}}>
          <div style={{fontSize:11,fontWeight:800,color:"var(--t3)",letterSpacing:".07em",marginBottom:12}}>OUTCOME SPLIT</div>
          {total===0?<div style={{fontSize:12,color:"var(--t4)"}}>No data</div>:(
            <>
              <div style={{display:"flex",gap:4,marginBottom:8,height:12,borderRadius:99,overflow:"hidden"}}>
                {res>0&&<div style={{flex:res,background:"#22c55e"}}/>}
                {esc>0&&<div style={{flex:esc,background:"#f59e0b"}}/>}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontSize:13,color:"#22c55e",fontWeight:700}}>✅ Resolved</span>
                  <span style={{fontSize:13,fontWeight:800,color:"#22c55e"}}>{res} <span style={{fontSize:11,color:"var(--t4)"}}>({resPct}%)</span></span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontSize:13,color:"#f59e0b",fontWeight:700}}>🔔 Escalated</span>
                  <span style={{fontSize:13,fontWeight:800,color:"#f59e0b"}}>{esc} <span style={{fontSize:11,color:"var(--t4)"}}>({total?Math.round((esc/total)*100):0}%)</span></span>
                </div>
              </div>
            </>
          )}
        </div>
      </div>

      {/* Top recurring issues */}
      <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:10,padding:"14px 16px",marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:800,color:"var(--t3)",letterSpacing:".07em",marginBottom:12}}>TOP RECURRING ISSUES</div>
        {issueCounts.length===0?<div style={{fontSize:12,color:"var(--t4)"}}>No data</div>:(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {issueCounts.map(({issue,count},i)=>(
              <div key={i}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,gap:8}}>
                  <span style={{fontSize:12,color:"var(--t2)",flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    <span style={{color:"var(--t4)",marginRight:6,fontFamily:"monospace"}}>{i+1}.</span>{issue.symptom}
                  </span>
                  <span style={{fontSize:12,fontWeight:800,color:count>3?"#ef4444":count>1?"#f59e0b":"var(--t3)",flexShrink:0}}>{count}×</span>
                </div>
                <div style={{height:4,background:"var(--border)",borderRadius:99,overflow:"hidden"}}>
                  <div style={{width:`${(count/maxIss)*100}%`,height:"100%",background:count>3?"#ef4444":count>1?"#f59e0b":"#334155",borderRadius:99,transition:"width 600ms ease"}}/>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Recent log table */}
      <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:10,padding:"14px 16px"}}>
        <div style={{fontSize:11,fontWeight:800,color:"var(--t3)",letterSpacing:".07em",marginBottom:12}}>RECENT LOG</div>
        {recent.length===0?<div style={{fontSize:12,color:"var(--t4)"}}>No records</div>:(
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead>
                <tr style={{borderBottom:"1px solid var(--border)"}}>
                  {["Date","Time","Symptom","Tag","Line","SKU","Operator","Time to Fix","Outcome","Video"].map(h=>(
                    <th key={h} style={{padding:"6px 10px",textAlign:"left",color:"var(--t4)",fontWeight:700,fontSize:10,letterSpacing:".06em",whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {recent.map(r=>(
                  <tr key={r.id} style={{borderBottom:"1px solid var(--border)"}}>
                    <td style={{padding:"8px 10px",color:"var(--t3)",whiteSpace:"nowrap"}}>{fmtDate(r.timestamp)}</td>
                    <td style={{padding:"8px 10px",color:"var(--t3)",whiteSpace:"nowrap"}}>{fmtTime(r.timestamp)}</td>
                    <td style={{padding:"8px 10px",color:"var(--t2)",maxWidth:220,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.symptom}</td>
                    <td style={{padding:"8px 10px"}}><TagBadge tag={r.tag}/></td>
                    <td style={{padding:"8px 10px"}}><LineBadge line={r.line||"?"}/></td>
                    <td style={{padding:"8px 10px",color:"var(--pur)",fontFamily:"monospace",fontSize:11}}>{r.sku}</td>
                    <td style={{padding:"8px 10px",color:"var(--t2)",whiteSpace:"nowrap"}}>{r.operator}</td>
                    <td style={{padding:"8px 10px",color:"var(--t3)",fontFamily:"monospace",whiteSpace:"nowrap"}}>{r.timeToFix}</td>
                    <td style={{padding:"8px 10px"}}>
                      <span style={{background:r.outcome==="resolved"?"rgba(34,197,94,.12)":"rgba(245,158,11,.12)",color:r.outcome==="resolved"?"#22c55e":"#f59e0b",border:`1px solid ${r.outcome==="resolved"?"rgba(34,197,94,.3)":"rgba(245,158,11,.3)"}`,borderRadius:4,fontSize:10,fontWeight:700,padding:"2px 7px"}}>
                        {r.outcome==="resolved"?"✅ Resolved":"🔔 Escalated"}
                      </span>
                    </td>
                    <td style={{padding:"8px 10px"}}>
                      {r.videoUrl?(
                        <button onClick={()=>setWatchUrl(r.videoUrl)}
                          style={{display:"inline-flex",alignItems:"center",gap:4,background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.22)",borderRadius:5,padding:"3px 8px",color:"var(--red)",fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
                          📹 Watch
                        </button>
                      ):<span style={{color:"var(--t5)",fontSize:11}}>—</span>}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── ADMIN PANEL ──────────────────────────────────────────────────────────────
function AdminPanel({issues, saveIssues, escalationEmail, saveEscalation, currentPin, savePin, onResetData, guides, saveGuide, removeGuide}) {
  const [view,setView]=useState("list"); // list | add | edit | settings
  const [editTarget,setEditTarget]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const [resetConfirm,setResetConfirm]=useState(false);
  const [resetPin,setResetPin]=useState("");
  const [resetPinErr,setResetPinErr]=useState(false);
  const [videoEdit,setVideoEdit]=useState(null); // issueId being edited
  const [videoDraft,setVideoDraft]=useState("");
  const [adminSearch,setAdminSearch]=useState("");

  const startEdit = issue => { setEditTarget(issue); setView("edit"); };
  const startAdd  = ()    => { setEditTarget(null);  setView("add");  };

  const handleSave = issue => {
    if(editTarget){
      saveIssues(issues.map(i=>i.id===issue.id?issue:i));
    } else {
      saveIssues([...issues,issue]);
    }
    setView("list");
  };

  const handleDelete = id => {
    saveIssues(issues.filter(i=>i.id!==id));
    setConfirm(null);
  };

  if(view==="add"||view==="edit"){
    return <IssueForm initial={editTarget} onSave={handleSave} onCancel={()=>setView("list")}/>;
  }

  if(view==="settings"){
    return <SettingsForm escalationEmail={escalationEmail} saveEscalation={saveEscalation} currentPin={currentPin} savePin={savePin} onBack={()=>setView("list")}/>;
  }

  return (
    <div style={{padding:"16px 20px",maxWidth:900,margin:"0 auto"}}>
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
        <button className="btn btn--amber" onClick={startAdd}>+ Add New Issue</button>
        <button className="btn btn--ghost" onClick={()=>setView("settings")}>⚙ Settings</button>
        <button className="btn btn--red" style={{marginLeft:"auto"}} onClick={()=>setResetConfirm(true)}>🗑 Reset All Data</button>
        <span style={{fontSize:12,color:"var(--t4)"}}>{issues.length} issues</span>
      </div>
      <div className="search-wrap" style={{marginBottom:14}}>
        <span className="search-icon" style={{color:"var(--t4)"}}>🔍</span>
        <input value={adminSearch} onChange={e=>setAdminSearch(e.target.value)}
          placeholder="Search issues by name, tag, category…"
          className="input" style={{paddingLeft:36,paddingRight:adminSearch?32:12}}/>
        {adminSearch&&<button className="search-clear" onClick={()=>setAdminSearch("")}>×</button>}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {issues.filter(i=>{ const q=adminSearch.toLowerCase().trim(); return !q||i.symptom.toLowerCase().includes(q)||i.tag.toLowerCase().includes(q)||i.category.toLowerCase().includes(q); }).map(issue=>{
          const hasGuide=!!(guides&&guides[issue.id]);
          const isEditingVideo=videoEdit===issue.id;
          return (
            <div key={issue.id} style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:10,overflow:"hidden",boxShadow:"var(--shadow-sm)"}}>
              {/* Issue row */}
              <div style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                <div style={{flex:1,minWidth:200}}>
                  <div style={{display:"flex",gap:5,marginBottom:4,flexWrap:"wrap"}}>
                    <SevBadge sev={issue.severity}/><TagBadge tag={issue.tag}/><LineBadge line={issue.line}/>
                    {hasGuide&&<span style={{background:"#e8f5f3",color:"var(--acc)",border:"1px solid #a0d0c8",borderRadius:4,fontSize:10,fontWeight:700,padding:"2px 7px"}}>🎬 Video set</span>}
                  </div>
                  <div style={{fontSize:13,fontWeight:700,color:"var(--t1)"}}>{issue.symptom}</div>
                  <div style={{fontSize:11,color:"var(--t4)",marginTop:2}}>{issue.steps.length} steps · {issue.category}</div>
                </div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  <button className="btn" style={{padding:"6px 12px",fontSize:12,background:hasGuide?"#e8f5f3":"var(--bg-deep)",border:`1px solid ${hasGuide?"#a0d0c8":"var(--border-mid)"}`,color:hasGuide?"var(--acc)":"var(--t3)"}}
                    onClick={()=>{ if(isEditingVideo){setVideoEdit(null);}else{setVideoEdit(issue.id);setVideoDraft(guides?.[issue.id]||"");} }}>
                    🎬 {hasGuide?"Edit Video":"Add Video"}
                  </button>
                  <button className="btn btn--blue" style={{padding:"6px 12px",fontSize:12}} onClick={()=>startEdit(issue)}>✏ Edit</button>
                  <button className="btn btn--red" style={{padding:"6px 12px",fontSize:12}} onClick={()=>setConfirm(issue.id)}>🗑 Delete</button>
                </div>
              </div>
              {/* Inline video URL editor */}
              {isEditingVideo&&(
                <div style={{borderTop:"1px solid var(--border)",padding:"12px 16px",background:"var(--bg-deep)"}}>
                  <div style={{fontSize:11,fontWeight:600,color:"var(--t3)",marginBottom:8}}>🎬 Video Guide URL — paste a YouTube link, SharePoint link, or direct .mp4 URL</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    <input value={videoDraft} onChange={e=>setVideoDraft(e.target.value)}
                      placeholder="https://youtube.com/watch?v=… or SharePoint link"
                      className="input" style={{flex:"1 1 260px"}}
                      onKeyDown={e=>{ if(e.key==="Enter"&&videoDraft.trim()){ saveGuide(issue.id,videoDraft.trim()); setVideoEdit(null); } }}/>
                    <button className="btn btn--amber" disabled={!videoDraft.trim()}
                      onClick={()=>{ saveGuide(issue.id,videoDraft.trim()); setVideoEdit(null); }}>
                      💾 Save
                    </button>
                    {hasGuide&&(
                      <button className="btn btn--red" style={{padding:"9px 12px"}}
                        onClick={()=>{ removeGuide(issue.id); setVideoEdit(null); }}>
                        Remove
                      </button>
                    )}
                    <button className="btn btn--ghost" onClick={()=>setVideoEdit(null)}>Cancel</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      {confirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}}>
          <div className="modal" style={{background:"var(--bg-panel)",border:"1px solid var(--border)",borderRadius:14,padding:24,width:"min(360px,90vw)",textAlign:"center",boxShadow:"var(--shadow-lg)"}}>
            <div style={{fontSize:32,marginBottom:12}}>🗑</div>
            <div style={{fontSize:15,fontWeight:700,color:"var(--t1)",marginBottom:8}}>Delete this issue?</div>
            <div style={{fontSize:12,color:"var(--t3)",marginBottom:20}}>This cannot be undone.</div>
            <div style={{display:"flex",gap:8,justifyContent:"center"}}>
              <button className="btn btn--red" onClick={()=>handleDelete(confirm)}>Delete</button>
              <button className="btn btn--ghost" onClick={()=>setConfirm(null)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
      {resetConfirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}}>
          <div className="modal" style={{background:"var(--bg-panel)",border:"1px solid #fecaca",borderRadius:14,padding:24,width:"min(380px,90vw)",textAlign:"center",boxShadow:"var(--shadow-lg)"}}>
            <div style={{fontSize:36,marginBottom:12}}>🔐</div>
            <div style={{fontSize:16,fontWeight:800,color:"var(--red)",marginBottom:8}}>Confirm Reset</div>
            <div style={{fontSize:13,color:"var(--t3)",marginBottom:4,lineHeight:1.6}}>This will permanently delete <strong>all issue logs</strong> from Firebase.</div>
            <div style={{fontSize:12,color:"var(--t4)",marginBottom:16}}>Enter your Admin PIN to confirm.</div>
            <input
              type="password" inputMode="numeric" maxLength={8}
              value={resetPin} onChange={e=>{setResetPin(e.target.value);setResetPinErr(false);}}
              onKeyDown={e=>{if(e.key==="Enter"){if(resetPin===currentPin){onResetData();setResetConfirm(false);setResetPin("");}else{setResetPinErr(true);}}}}
              placeholder="Enter PIN"
              className={`input${resetPinErr?" input--error":""}`}
              style={{textAlign:"center",letterSpacing:".25em",fontSize:18,marginBottom:resetPinErr?4:16}}
              autoFocus/>
            {resetPinErr&&<div style={{fontSize:12,color:"var(--red)",marginBottom:12,fontWeight:600}}>⚠ Incorrect PIN</div>}
            <div style={{display:"flex",gap:8,justifyContent:"center"}}>
              <button className="btn btn--red" style={{padding:"10px 20px"}} onClick={()=>{
                if(resetPin===currentPin){onResetData();setResetConfirm(false);setResetPin("");}
                else{setResetPinErr(true);}
              }}>Delete All Logs</button>
              <button className="btn btn--ghost" style={{padding:"10px 20px"}} onClick={()=>{setResetConfirm(false);setResetPin("");setResetPinErr(false);}}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function IssueForm({initial, onSave, onCancel}) {
  const blank = {id:uid(),line:"All Lines",category:"equipment",severity:"warning",tag:"",symptom:"",keywords:[],cause:"",steps:[""],escalate:false,escalateNote:""};
  const [form,setForm]=useState(initial||blank);
  const [stepInput,setStepInput]=useState((initial?.steps||[""]).join("\n"));
  const [errors,setErrors]=useState({});

  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const handleSubmit = () => {
    const errs={};
    if(!form.symptom.trim()) errs.symptom="Required";
    if(!form.cause.trim()) errs.cause="Required";
    if(!form.tag.trim()) errs.tag="Required";
    const steps=stepInput.split("\n").map(s=>s.trim()).filter(Boolean);
    if(steps.length===0) errs.steps="At least one step required";
    if(Object.keys(errs).length){ setErrors(errs); return; }
    onSave({...form,steps,keywords:form.symptom.toLowerCase().split(" ")});
  };

  const field = (label,key,placeholder,required) => (
    <div style={{marginBottom:14}}>
      <label style={{fontSize:11,color:"var(--t3)",display:"block",marginBottom:5,fontWeight:600}}>{label}{required&&<span style={{color:"var(--red)"}}> *</span>}</label>
      <input value={form[key]||""} onChange={e=>set(key,e.target.value)} placeholder={placeholder}
        className={`input${errors[key]?" input--error":""}`}/>
      {errors[key]&&<div style={{color:"var(--red)",fontSize:11,marginTop:3}}>{errors[key]}</div>}
    </div>
  );

  return (
    <div style={{padding:"16px 20px",maxWidth:700,margin:"0 auto"}}>
      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:20}}>
        <button className="btn btn--ghost" onClick={onCancel}>← Back</button>
        <h2 style={{fontSize:16,fontWeight:800}}>{initial?"Edit Issue":"Add New Issue"}</h2>
      </div>
      <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:12,padding:20}}>
        {field("Symptom / Issue Title","symptom","What the operator sees…",true)}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
          <div>
            <label style={{fontSize:11,color:"var(--t3)",display:"block",marginBottom:5,fontWeight:600}}>Line</label>
            <select value={form.line} onChange={e=>set("line",e.target.value)} className="input">
              {["All Lines","Line 1","Line 2","Line 3","Line 4","Line 5"].map(l=><option key={l}>{l}</option>)}
            </select>
          </div>
          <div>
            <label style={{fontSize:11,color:"var(--t3)",display:"block",marginBottom:5,fontWeight:600}}>Category</label>
            <select value={form.category} onChange={e=>set("category",e.target.value)} className="input">
              {["equipment","quality","safety"].map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div>
            <label style={{fontSize:11,color:"var(--t3)",display:"block",marginBottom:5,fontWeight:600}}>Severity</label>
            <select value={form.severity} onChange={e=>set("severity",e.target.value)} className="input">
              {["critical","warning","advisory"].map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:11,color:"var(--t3)",display:"block",marginBottom:5,fontWeight:600}}>Tag <span style={{color:"var(--red)"}}>*</span></label>
          <input value={form.tag} onChange={e=>set("tag",e.target.value.toUpperCase())} placeholder="e.g. OVEN, MIXER, CONVEYOR"
            className={`input${errors.tag?" input--error":""}`}/>
          {errors.tag&&<div style={{color:"var(--red)",fontSize:11,marginTop:3}}>{errors.tag}</div>}
        </div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:11,color:"var(--t3)",display:"block",marginBottom:5,fontWeight:600}}>Root Cause <span style={{color:"var(--red)"}}>*</span></label>
          <textarea value={form.cause} onChange={e=>set("cause",e.target.value)} rows={3}
            placeholder="What causes this issue…" className={`input${errors.cause?" input--error":""}`} style={{resize:"vertical"}}/>
          {errors.cause&&<div style={{color:"var(--red)",fontSize:11,marginTop:3}}>{errors.cause}</div>}
        </div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:11,color:"var(--t3)",display:"block",marginBottom:5,fontWeight:600}}>Corrective Steps <span style={{color:"var(--red)"}}>*</span> <span style={{fontWeight:400,color:"var(--t4)"}}>(one per line)</span></label>
          <textarea value={stepInput} onChange={e=>setStepInput(e.target.value)} rows={6}
            placeholder={"Step 1\nStep 2\nStep 3"} className={`input${errors.steps?" input--error":""}`} style={{resize:"vertical",fontFamily:"inherit"}}/>
          {errors.steps&&<div style={{color:"var(--red)",fontSize:11,marginTop:3}}>{errors.steps}</div>}
        </div>
        <div style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:14}}>
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",userSelect:"none"}}>
            <input type="checkbox" checked={form.escalate} onChange={e=>set("escalate",e.target.checked)}
              style={{width:16,height:16,accentColor:"var(--acc)"}}/>
            <span style={{fontSize:12,color:"var(--t2)",fontWeight:600}}>This issue can be escalated</span>
          </label>
        </div>
        {form.escalate&&(
          <div style={{marginBottom:14}}>
            <label style={{fontSize:11,color:"var(--t3)",display:"block",marginBottom:5,fontWeight:600}}>Escalation Note</label>
            <textarea value={form.escalateNote||""} onChange={e=>set("escalateNote",e.target.value)} rows={2}
              placeholder="When to escalate and to whom…" className="input" style={{resize:"vertical"}}/>
          </div>
        )}
        <div style={{display:"flex",gap:8,marginTop:4}}>
          <button className="btn btn--amber" onClick={handleSubmit}>💾 Save Issue</button>
          <button className="btn btn--ghost" onClick={onCancel}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

const EJS_KEY_KEY      = "cre_ejs_pubkey";
const EJS_SERVICE_KEY  = "cre_ejs_service";
const EJS_TEMPLATE_KEY = "cre_ejs_template";

function SettingsForm({escalationEmail, saveEscalation, currentPin, savePin, onBack}) {
  const [email,setEmail]=useState(escalationEmail||"");
  const [pin,setPin]=useState("");
  const [pin2,setPin2]=useState("");
  const [emailSaved,setEmailSaved]=useState(false);
  const [pinSaved,setPinSaved]=useState(false);
  const [pinErr,setPinErr]=useState("");
  const [ejsKey,setEjsKey]=useState(()=>store.get(EJS_KEY_KEY)||"");
  const [ejsService,setEjsService]=useState(()=>store.get(EJS_SERVICE_KEY)||"");
  const [ejsTemplate,setEjsTemplate]=useState(()=>store.get(EJS_TEMPLATE_KEY)||"");
  const [ejsSaved,setEjsSaved]=useState(false);

  const handleEmailSave = () => { saveEscalation(email.trim()); setEmailSaved(true); setTimeout(()=>setEmailSaved(false),2000); };
  const handlePinSave = () => {
    if(pin.length<4){ setPinErr("PIN must be at least 4 characters"); return; }
    if(pin!==pin2){ setPinErr("PINs do not match"); return; }
    savePin(pin); setPinErr(""); setPinSaved(true); setPin(""); setPin2("");
    setTimeout(()=>setPinSaved(false),2000);
  };
  const handleEjsSave = () => {
    store.set(EJS_KEY_KEY, ejsKey.trim());
    store.set(EJS_SERVICE_KEY, ejsService.trim());
    store.set(EJS_TEMPLATE_KEY, ejsTemplate.trim());
    setEjsSaved(true); setTimeout(()=>setEjsSaved(false),2000);
  };

  return (
    <div style={{padding:"16px 20px",maxWidth:540,margin:"0 auto"}}>
      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:20}}>
        <button className="btn btn--ghost" onClick={onBack}>← Back</button>
        <h2 style={{fontSize:16,fontWeight:800}}>Settings</h2>
      </div>
      {/* Escalation email */}
      <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:12,padding:20,marginBottom:14,boxShadow:"var(--shadow-sm)"}}>
        <div style={{fontSize:12,fontWeight:800,color:"var(--t2)",marginBottom:4}}>📧 Global Escalation Email</div>
        <div style={{fontSize:11,color:"var(--t4)",marginBottom:12}}>Escalation notifications are sent to this address.</div>
        <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="escalation@fgfbrands.com"
          className="input" style={{marginBottom:10}}/>
        <button className="btn btn--amber" onClick={handleEmailSave}>
          {emailSaved?"✅ Saved!":"Save Email"}
        </button>
      </div>
      {/* EmailJS auto-send */}
      <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:12,padding:20,marginBottom:14,boxShadow:"var(--shadow-sm)"}}>
        <div style={{fontSize:12,fontWeight:800,color:"var(--t2)",marginBottom:4}}>⚡ Auto Email (EmailJS)</div>
        <div style={{fontSize:11,color:"var(--t4)",marginBottom:12,lineHeight:1.6}}>
          Connect <a href="https://www.emailjs.com" target="_blank" rel="noopener noreferrer" style={{color:"var(--blu)"}}>EmailJS</a> to auto-send escalation emails without opening the mail app.
          Free account → Email Services → Add service → Email Templates → Create template with variables: <code style={{background:"var(--bg-deep)",padding:"1px 4px",borderRadius:3,fontSize:10}}>{"{{to_email}} {{issue_title}} {{operator_name}} {{sku}} {{line}} {{tag}} {{severity}} {{time_to_fix}} {{notes}} {{escalation_note}} {{timestamp}}"}</code>
        </div>
        <label style={{fontSize:11,color:"var(--t3)",display:"block",marginBottom:4,fontWeight:600}}>Public Key</label>
        <input value={ejsKey} onChange={e=>setEjsKey(e.target.value)} placeholder="Your EmailJS Public Key"
          className="input" style={{marginBottom:8}}/>
        <label style={{fontSize:11,color:"var(--t3)",display:"block",marginBottom:4,fontWeight:600}}>Service ID</label>
        <input value={ejsService} onChange={e=>setEjsService(e.target.value)} placeholder="service_xxxxxxx"
          className="input" style={{marginBottom:8}}/>
        <label style={{fontSize:11,color:"var(--t3)",display:"block",marginBottom:4,fontWeight:600}}>Template ID</label>
        <input value={ejsTemplate} onChange={e=>setEjsTemplate(e.target.value)} placeholder="template_xxxxxxx"
          className="input" style={{marginBottom:10}}/>
        <button className="btn btn--amber" onClick={handleEjsSave}>
          {ejsSaved?"✅ Saved!":"Save EmailJS Config"}
        </button>
      </div>
      {/* Change PIN */}
      <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:12,padding:20,boxShadow:"var(--shadow-sm)"}}>
        <div style={{fontSize:12,fontWeight:800,color:"var(--t2)",marginBottom:12}}>🔐 Change Admin PIN</div>
        <input type="password" value={pin} onChange={e=>setPin(e.target.value)} placeholder="New PIN"
          className="input" style={{marginBottom:8}}/>
        <input type="password" value={pin2} onChange={e=>setPin2(e.target.value)} placeholder="Confirm new PIN"
          className="input" style={{marginBottom:pinErr?4:10}}/>
        {pinErr&&<div style={{color:"var(--red)",fontSize:11,marginBottom:8}}>{pinErr}</div>}
        <button className="btn btn--amber" onClick={handlePinSave}>
          {pinSaved?"✅ PIN Updated!":"Update PIN"}
        </button>
      </div>
    </div>
  );
}

// ─── PIN GATE ─────────────────────────────────────────────────────────────────
function PinGate({correctPin, onUnlock}) {
  const [val,setVal]=useState(""); const [err,setErr]=useState(false); const [errKey,setErrKey]=useState(0);
  const ref=useRef(null);
  useEffect(()=>ref.current?.focus(),[]);
  const attempt = () => {
    if(val===correctPin){ onUnlock(); }
    else{ setErr(true); setErrKey(k=>k+1); setVal(""); setTimeout(()=>setErr(false),1000); }
  };
  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"60vh",padding:20}}>
      <div className="modal" style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:16,padding:32,width:"min(360px,90vw)",textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:12}}>🔐</div>
        <div style={{fontSize:18,fontWeight:800,marginBottom:4}}>Admin Access</div>
        <div style={{fontSize:12,color:"var(--t3)",marginBottom:24}}>Enter PIN to continue</div>
        <input key={`pin-${errKey}`} ref={ref} type="password" value={val} onChange={e=>setVal(e.target.value)}
          placeholder="PIN" className={`input${err?" input--error":""}`}
          style={{textAlign:"center",fontSize:20,letterSpacing:"0.3em",marginBottom:12}}
          onKeyDown={e=>{if(e.key==="Enter")attempt();}}/>
        {err&&<div style={{color:"var(--red)",fontSize:12,marginBottom:8,fontWeight:600}}>Incorrect PIN</div>}
        <button className="btn btn--amber btn--full" onClick={attempt}>Unlock →</button>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const { records, addRecord } = useRecords();
  const { issues, saveIssues, issuesLoaded } = useIssues();
  const { guides, saveGuide, removeGuide } = useGuides();

  const [escalationEmail, setEscalationEmail] = useState(()=>store.get(ESC_KEY)||"");
  const [adminPin, setAdminPin] = useState(()=>store.get(PIN_KEY)||DEFAULT_PIN);
  const [tab, setTab] = useState("home"); // home | analytics | admin
  const [adminUnlocked, setAdminUnlocked] = useState(false);

  const [search, setSearch] = useState("");
  const [filterLine, setFilterLine] = useState("All");
  const [filterSev, setFilterSev]   = useState("All");
  const [filterCat, setFilterCat]   = useState("All");

  const [selectedIssue, setSelectedIssue] = useState(null);
  const [checkedSteps, setCheckedSteps]   = useState(new Set());
  const [isClosed, setIsClosed]           = useState(false);
  const [closedInfo, setClosedInfo]       = useState(null);
  const [toast, setToast]                 = useState(null);

  const elapsed = useTimer(!!selectedIssue&&!isClosed);

  const saveEscalation = email => { setEscalationEmail(email); store.set(ESC_KEY,email); };
  const savePinFn      = pin   => { setAdminPin(pin); store.set(PIN_KEY,pin); };
  const resetData      = ()    => { db.ref('logs').remove(); };

  const logCounts = useMemo(()=>{
    const m={}; records.forEach(r=>{ m[r.issueId]=(m[r.issueId]||0)+1; }); return m;
  },[records]);

  const lines = useMemo(()=>["All",...new Set(issues.map(i=>i.line))],[issues]);

  const filtered = useMemo(()=>{
    const q=search.toLowerCase().trim();
    return issues.filter(issue=>{
      if(filterLine!=="All"&&issue.line!==filterLine) return false;
      if(filterSev!=="All"&&issue.severity!==filterSev) return false;
      if(filterCat!=="All"&&issue.category!==filterCat) return false;
      if(!q) return true;
      return issue.symptom.toLowerCase().includes(q)||
             issue.cause.toLowerCase().includes(q)||
             issue.tag.toLowerCase().includes(q)||
             (issue.keywords||[]).some(k=>k.includes(q));
    });
  },[issues,search,filterLine,filterSev,filterCat]);

  const openIssue = issue => {
    setSelectedIssue(issue); setCheckedSteps(new Set()); setIsClosed(false); setClosedInfo(null);
  };
  const closePanel = () => { setSelectedIssue(null); setCheckedSteps(new Set()); setIsClosed(false); setClosedInfo(null); };

  const toggleStep = i => {
    setCheckedSteps(prev=>{ const n=new Set(prev); n.has(i)?n.delete(i):n.add(i); return n; });
  };

  const handleSubmit = ({outcome,operator,sku,notes,videoUrl,timeToFix}) => {
    const rec={id:uid(),issueId:selectedIssue.id,symptom:selectedIssue.symptom,tag:selectedIssue.tag,
      line:selectedIssue.line,severity:selectedIssue.severity,category:selectedIssue.category,
      operator,sku,notes,videoUrl:videoUrl||"",timeToFix,outcome,timestamp:Date.now()};
    addRecord(rec);
    setIsClosed(true); setClosedInfo({outcome,operator,sku,timeToFix});
    setToast({outcome,symptom:selectedIssue.symptom});
  };

  return (
    <>
      <style dangerouslySetInnerHTML={{__html:CSS}}/>

      {/* HEADER */}
      <header className="app-header">
        <div style={{maxWidth:1200,margin:"0 auto",padding:"10px 16px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          {/* FGF Logo area */}
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            {/* FGF logo — matches Intranet Portal */}
            <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
              <div style={{background:"var(--fgf-green)",borderRadius:6,padding:"6px 10px",boxShadow:"0 2px 8px rgba(58,171,94,.35)"}}>
                <span style={{fontFamily:"'Inter',sans-serif",fontWeight:900,fontSize:16,color:"#fff",letterSpacing:".08em",lineHeight:1}}>FGF</span>
              </div>
              <div style={{display:"flex",flexDirection:"column"}}>
                <span style={{fontSize:13,fontWeight:800,color:"var(--t1)",lineHeight:1.2,letterSpacing:".01em"}}>CRE Troubleshoot Matrix</span>
                <span style={{fontSize:10,color:"var(--t4)",fontWeight:400,marginTop:1}}>{PLANT_NAME} · v{APP_VER}</span>
              </div>
            </div>
          </div>

          {/* Nav */}
          <nav style={{display:"flex",gap:4,marginLeft:"auto"}}>
            {[["home","🏠 Issues"],["analytics","📊 Analytics"],["admin","⚙ Admin"]].map(([id,label])=>(
              <button key={id} className={`nav-tab${tab===id?" active":""}`}
                onClick={()=>{ setTab(id); if(id==="admin"&&!adminUnlocked){}; }}>
                {label}
              </button>
            ))}
          </nav>
        </div>
      </header>

      {/* CONTENT */}
      <main style={{minHeight:"calc(100vh - 56px)"}}>

        {/* ── HOME TAB ── */}
        {tab==="home"&&(
          <div style={{maxWidth:1200,margin:"0 auto",padding:"14px 16px"}}>
            {/* Search + filters */}
            <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
              <div className="search-wrap" style={{flex:"1 1 200px",minWidth:180}}>
                <span className="search-icon">🔍</span>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search issues…"
                  className="input" style={{paddingLeft:36,paddingRight:search?32:12}}/>
                {search&&<button className="search-clear" onClick={()=>setSearch("")}>×</button>}
              </div>
              <select value={filterLine} onChange={e=>setFilterLine(e.target.value)} className="input" style={{width:"auto",padding:"9px 12px",fontSize:12}}>
                {lines.map(l=><option key={l}>{l}</option>)}
              </select>
              <select value={filterSev} onChange={e=>setFilterSev(e.target.value)} className="input" style={{width:"auto",padding:"9px 12px",fontSize:12}}>
                <option value="All">All Severity</option>
                <option value="critical">Critical</option>
                <option value="warning">Warning</option>
                <option value="advisory">Advisory</option>
              </select>
              <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} className="input" style={{width:"auto",padding:"9px 12px",fontSize:12}}>
                <option value="All">All Categories</option>
                <option value="equipment">Equipment</option>
                <option value="quality">Quality</option>
                <option value="safety">Safety</option>
              </select>
              <span style={{fontSize:11,color:"var(--t4)"}}>{filtered.length} / {issues.length}</span>
            </div>
            {!issuesLoaded?(
              <div style={{textAlign:"center",padding:"60px 20px",color:"var(--t4)"}}>
                <div style={{fontSize:13,color:"var(--t4)"}}>Loading issues…</div>
              </div>
            ):filtered.length===0?(
              <div style={{textAlign:"center",padding:"60px 20px",color:"var(--t4)"}}>
                <div style={{fontSize:40,marginBottom:12}}>🔍</div>
                <div style={{fontSize:16,fontWeight:600,color:"var(--t3)"}}>No issues match your search</div>
              </div>
            ):(
              <div className="card-grid">
                {filtered.map(issue=>(
                  <IssueCard key={issue.id} issue={issue}
                    logCount={logCounts[issue.id]||0}
                    hasGuide={!!guides[issue.id]}
                    onClick={()=>openIssue(issue)}/>
                ))}
              </div>
            )}
          </div>
        )}

        {/* ── ANALYTICS TAB ── */}
        {tab==="analytics"&&<AnalyticsTab records={records} issues={issues}/>}

        {/* ── ADMIN TAB ── */}
        {tab==="admin"&&(
          adminUnlocked
            ? <AdminPanel issues={issues} saveIssues={saveIssues}
                escalationEmail={escalationEmail} saveEscalation={saveEscalation}
                currentPin={adminPin} savePin={savePinFn} onResetData={resetData}
                guides={guides} saveGuide={saveGuide} removeGuide={removeGuide}/>
            : <PinGate correctPin={adminPin} onUnlock={()=>setAdminUnlocked(true)}/>
        )}
      </main>

      {/* ── DETAIL PANEL ── */}
      {selectedIssue&&(
        <DetailPanel
          issue={selectedIssue} elapsed={elapsed}
          steps={checkedSteps} isClosed={isClosed} closedInfo={closedInfo}
          guideUrl={guides[selectedIssue.id]||""}
          onToggleStep={toggleStep} onSubmit={handleSubmit} onClose={closePanel}
          onSaveGuide={saveGuide} onRemoveGuide={removeGuide}
          escalationEmail={escalationEmail} adminUnlocked={adminUnlocked}/>
      )}

      {/* ── TOAST ── */}
      {toast&&<Toast toast={toast} onDone={()=>setToast(null)}/>}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
  </script>
</body>
</html>
